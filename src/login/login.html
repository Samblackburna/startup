<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Tell browsers not to scale the viewport automatically -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>quiltednews-html</title>
    <link rel="stylesheet" href="main.css" />
  </head>
  <body>
    <header>
    <!-- Navigation elements -->
      <nav>
        <img class="logo" alt="Quilted News" src="QuiltedLogo.png">
        <ul>
          <li class="nav-item">
            <a class="nav-link active" href="index.html">Sign In</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="articles.html">Articles</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="newsSourceHome.html">My News Source</a>
          </li>
        </ul>
      </nav>
      <hr style="margin-bottom: 2px;"/>
      <hr style="margin-top: 0; padding-top: 0;"/>

    <main>
      <div>
        <h3 class="sign-in-notice">Sign in or create account</h3>
      </div>
      <form method="get" action="play.html">
        <div style="width: 100%;">
          <span class="sign-in">Email or Username</span>
          <input type="text" />
        </div>
        <div style="width: 100%;">
          <span class="sign-in">Password</span>
          <input type="text" />
        </div>
        <div style="width: 100%; " class="button-holder">
          <button style="width: 100%; " type="submit">Sign in</button>
          <button type="submit">Create</button>
        </div>
      </form>
    </main>
    <footer>
      <hr />
      <span class="text-reset">Samuel Blackburn</span>
      <a href="https://github.com/Samblackburna/startup">GitHub</a>
